{% extends 'base/base.html' %}

{% block content %}
<h1>Reading sessions of {{ profile_user.username }}</h1>

{% for session in sessions %}
<div>
    <p>Book: {{ session.book }}</p>
    <p>Date: {{ session.date }}</p>
    <p>Score: {{ session.score }}</p>
</div>
<hr>
{% empty %}
<p>This user has no reading sessions yet.</p>
{% endfor %}

{% endblock %}
