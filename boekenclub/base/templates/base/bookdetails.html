{% extends 'base/base.html' %}

{% block content %}
    <h1>Book details:</h1>
    <strong>Book: </strong> {{ book.name }}<br>
    <strong>Publication year: </strong> {{ book.publication_year }}<br>
    <strong>Genre: </strong> {{ book.genre }}<br><br>
    <strong>Times read: </strong> {{ times_read }}<br>
    <strong>Average score: </strong> {{ average_score }}<br>
    <a href="{% url 'reading_session' %}?book={{ book.pk }}">Add reading session</a>
{% endblock content %}
