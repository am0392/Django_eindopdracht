{% extends 'base/base.html' %}

{% block content %}
    <h1>All reading sessions</h1>
    {% for session in sessions %}
        <strong>Book: </strong> <a href="{% url 'book_details' session.Book.pk %}"> {{ session.Book.Name }} </a><br>
        <strong>Score: </strong> {{ session.Score }}<br>
        <strong>User: </strong> {{ session.User.username }}<br>
        <strong>Date: </strong> {{ session.Date }}<br><br>
    {% endfor %}
{% endblock content %}
