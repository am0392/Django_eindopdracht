{% extends 'base/base.html' %}

{% block content %}
<h1>Edit Reading Session</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" name="Save">Save</button>
    {% if edit %}
       <button type="submit" name="Delete" value="Delete">Delete</button>
    {% endif %}
    <a href="{% url 'RecentSessions' %}">Cancel</a>
</form>

{% endblock %}
