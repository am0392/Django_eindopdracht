{% extends 'base/base.html' %}

{% block content %}
<h1>Edit Reading Session</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Save">
    {% if edit %}
        <input type="submit" name="Delete" value="Delete">
    {% endif %}
    <a href="{% url 'RecentSessions' %}">Cancel</a>
</form>

{% endblock %}
