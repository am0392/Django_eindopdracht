{% extends 'base/base.html' %}

{% block content %}
<h1>My Reading Sessions</h1>

{% for session in sessions %}
<div>
    <p>Book: {{ session.book }}</p>
    <p>Date: {{ session.date }}</p>
    <p>Score: {{ session.score }}</p>
    <a href="{% url 'edit_session' session.pk %}">Edit</a>
</div>
<hr>
{% empty %}
<p>No reading sessions found.</p>
{% endfor %}

{% endblock %}
